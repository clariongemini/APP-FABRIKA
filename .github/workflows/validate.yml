name: Factory Validation v1.0.0

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FACTORY_VERSION: "1.0.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify factory version alignment
        run: bash scripts/validate-factory-version.sh

      - name: Run code validation
        run: bash scripts/validate-code.sh

      - name: Run 33-layer audit
        run: bash scripts/audit-layers.sh

      - name: Run layer component audit
        run: bash scripts/audit-layer-components.sh

      - name: Run OEM compatibility audit
        run: bash scripts/audit-oem-compat.sh

      - name: Run security audit
        run: bash scripts/audit-security.sh

      - name: Validate Android template quality
        run: bash scripts/validate-android-template.sh

      - name: Validate factory governance tree
        run: bash scripts/governance/validate-factory-governance.sh

      - name: Validate audit chain
        run: python3 scripts/governance/validate-audit-chain.py

      - name: Validate YAPILACAKLAR template
        run: |
          cp templates/YAPILACAKLAR.template.md YAPILACAKLAR.md
          sed -i "s/{{FACTORY_VERSION}}/${FACTORY_VERSION}/g" YAPILACAKLAR.md
          python3 scripts/governance/validate-yapilacaklar.py

      - name: Factory health score
        run: bash scripts/factory-health.sh

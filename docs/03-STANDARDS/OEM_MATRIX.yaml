# OEM Uyumluluk Matrisi — audit-oem-compat.sh bu dosyayı doğrular
version: "1.0"

priority_levels:
  P0: "Release blocker — test edilmeden yayın yok"
  P1: "Major market — release öncesi test zorunlu"
  P2: "Secondary — best effort"

manufacturers:
  samsung:
    name: Samsung
    rom: One UI
    priority: P0
    market_share_tr: "~22%"
    critical_checks:
      - id: battery_unrestricted
        label: Battery optimization unrestricted / Never sleeping
        tested: false
      - id: background_sync
        label: WorkManager sync survives 30min background
        tested: false
      - id: push_fcm
        label: FCM high-priority notification delivery
        tested: false
      - id: exact_alarm
        label: SCHEDULE_EXACT_ALARM / USE_EXACT_ALARM (API 31+)
        tested: false
      - id: split_screen
        label: Multi-window / foldable (if applicable)
        tested: false
    settings_intents:
      battery: "com.samsung.android.sm.ACTION_BATTERY"
      app_details: "android.settings.APPLICATION_DETAILS_SETTINGS"

  xiaomi:
    name: Xiaomi
    rom: MIUI / HyperOS
    priority: P0
    market_share_tr: "~28%"
    critical_checks:
      - id: autostart
        label: Autostart permission enabled (MIUI Security)
        tested: false
      - id: battery_no_restrict
        label: Battery saver No restrictions
        tested: false
      - id: background_sync
        label: SyncWorker survives MIUI task killer
        tested: false
      - id: display_overlay
        label: Display pop-up windows (if feature needs overlay)
        tested: false
      - id: notification_channels
        label: Notification channels not silenced by default
        tested: false
    settings_intents:
      autostart: "miui.intent.action.OP_AUTO_START"
      battery: "miui.intent.action.POWER_HIDE_MODE_APP_LIST"
      app_details: "android.settings.APPLICATION_DETAILS_SETTINGS"
    notes: "MIUI en agresif ROM — tüm arka plan özellikleri burada test edilmeli"

  oppo:
    name: OPPO
    rom: ColorOS
    priority: P1
    critical_checks:
      - id: autostart
        label: Startup manager allow
        tested: false
      - id: battery_background
        label: Allow background activity
        tested: false
      - id: background_sync
        label: Background sync 30min test
        tested: false

  vivo:
    name: vivo
    rom: OriginOS / Funtouch
    priority: P1
    critical_checks:
      - id: autostart
        label: Autostart enabled
        tested: false
      - id: background_sync
        label: Background sync test
        tested: false

  google:
    name: Google
    rom: Stock Android / Pixel
    priority: P1
    critical_checks:
      - id: baseline_behavior
        label: Reference implementation baseline
        tested: false
      - id: exact_alarm
        label: Exact alarm permission flow API 31+
        tested: false

  huawei:
    name: Huawei
    rom: EMUI / HarmonyOS
    priority: P2
    critical_checks:
      - id: hms_push_fallback
        label: FCM vs HMS push strategy documented
        tested: false
      - id: background_limits
        label: EMUI background restriction handling
        tested: false

  motorola:
    name: Motorola
    rom: My UX
    priority: P2
    critical_checks:
      - id: background_sync
        label: Standard background sync
        tested: false

required_modules:
  - core/oem/ManufacturerDetector.kt
  - core/oem/OemCompatFacade.kt
  - core/oem/OemBatteryOptimizer.kt
  - core/oem/OemAutostartGuide.kt

required_docs:
  - docs/03-STANDARDS/OEM_COMPATIBILITY.md
  - docs/03-STANDARDS/OEM_MATRIX.yaml

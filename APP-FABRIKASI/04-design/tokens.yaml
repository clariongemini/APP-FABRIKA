# Design Tokens (SVOS Canonical)

version: "1.0"

color:
  bg:
    primary: "#FFFFFF"
    secondary: "#F7F7F8"
    inverse: "#0A0A0B"
  fg:
    primary: "#0A0A0B"
    secondary: "#6B6B70"
    muted: "#9B9BA1"
  border:
    default: "#E5E5EA"
    strong: "#C8C8D0"
  accent:
    primary: "#2563EB"
    danger: "#DC2626"
    success: "#16A34A"

typography:
  font_family:
    sans: "Inter, system-ui, sans-serif"
    mono: "JetBrains Mono, monospace"
  scale:
    xs: 12
    sm: 14
    base: 16
    lg: 18
    xl: 24
    xxl: 32
  weight:
    normal: 400
    medium: 500
    semibold: 600

spacing:
  unit: 4
  scale: [0, 4, 8, 12, 16, 24, 32, 48, 64]

radius:
  sm: 6
  md: 10
  lg: 16

motion:
  fast: 150ms
  normal: 250ms
  slow: 400ms
  easing: "cubic-bezier(0.4, 0, 0.2, 1)"
